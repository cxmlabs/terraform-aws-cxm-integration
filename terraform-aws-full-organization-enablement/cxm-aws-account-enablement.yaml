AWSTemplateFormatVersion: "2010-09-09"
Parameters:
  Prefix:
    Type: String
    Default: cxm
    Description: Generic ID to namespace the stacks
  CXMExternalID:
    Type: String
    Description: External ID created for this deployment
    Default: customerid
  CustomerAccountID:
    Type: String
    Description: Account ID of the instance set up for this deployment
  AdminRoleArn:
    Type: String
    Description: ARN of the role to that will be used to read assets from the account
  RoleSuffix:
    Type: String
    Default: ""
    Description: Role name suffix
  EnableScheduling:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable scheduling and scaling permissions for FinOps cost optimization (disabled by default)
  EnableSavingsModifications:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Enable savings plan and RI modifications (purchase, modify, cancel, etc.). Setting this to true to preserve existing behavior (true by default)
  OrganizationID:
    Type: String
    Description: AWS Organizations root ID (o-xxxxxxxxxx) for sts:PrincipalOrgID on the cross-account admin assume-role statement.
Conditions:
  SchedulingEnabled: !Equals [!Ref EnableScheduling, "true"]
  SavingsModificationsEnabled: !Equals [!Ref EnableSavingsModifications, "true"]
Resources:
  ################################################################
  #
  # Asset Crawler
  #
  ################################################################
  IAMCrossAccountExecutionRole:
    DependsOn: CloudFormationNotifier
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Prefix}-asset-crawler${RoleSuffix}"
      # Mirrors terraform-aws-sub-account-cxm-enablement: enable_savings_modifications switches
      # Service Quotas / Savings Plans between FullAccess and ReadOnlyAccess managed policies.
      ManagedPolicyArns:
        Fn::If:
          - SavingsModificationsEnabled
          - - arn:aws:iam::aws:policy/ReadOnlyAccess
            - arn:aws:iam::aws:policy/ServiceQuotasFullAccess
            - arn:aws:iam::aws:policy/AWSSavingsPlansFullAccess
          - - arn:aws:iam::aws:policy/ReadOnlyAccess
            - arn:aws:iam::aws:policy/ServiceQuotasReadOnlyAccess
            - arn:aws:iam::aws:policy/AWSSavingsPlansReadOnlyAccess
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
                - ecs-tasks.amazonaws.com
                - codebuild.amazonaws.com
            Action: sts:AssumeRole
            # NOTE: Does this do what they think? Service principals don't normally use external IDs. - dpanofsky
            Condition:
              StringEquals:
                sts:ExternalId: !Sub "${CXMExternalID}"
          - Effect: Allow
            Action:
              - sts:AssumeRole
              - sts:TagSession
            Principal:
              AWS: !Sub "${AdminRoleArn}"
            # NOTE: Adding a organization restriction to be compliant with cloud working group requirements. - dpanofsky
            Condition:
              StringEquals:
                sts:PrincipalOrgID: !Sub "${OrganizationID}"
  # Base inventory: describe-only commitment monitoring + data-plane denies.
  # Mirrors terraform-aws-sub-account-cxm-enablement policies.tf (inventory_policy).
  InventoryPolicy:
    Type: AWS::IAM::Policy
    DependsOn: IAMCrossAccountExecutionRole
    Properties:
      PolicyName: !Sub "${Prefix}-asset-crawler-readonly${RoleSuffix}"
      Roles:
        - !Ref "IAMCrossAccountExecutionRole"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Sid: CommitmentMonitoringPermissions
            Resource: "*"
            Action:
              # DynamoDB Reservations
              - dynamodb:DescribeReservedCapacity
              - dynamodb:DescribeReservedCapacityOfferings
              # EC2 Reservations
              - ec2:DescribeReserved*
              - ec2:DescribeAvailabilityZones
              - ec2:DescribeAccountAttributes
              - ec2:DescribeRegions
              - ec2:DescribeInstances
              - ec2:DescribeInstanceTypes
              - ec2:DescribeTags
              - ec2:GetReserved*
              # RDS Reservations
              - rds:DescribeReserved*
              - rds:ListTagsForResource*
              # Redshift Reservations
              - redshift:DescribeReserved*
              - redshift:DescribeTags
              - redshift:GetReserved*
              # ElastiCache Reservations
              - elasticache:DescribeReserved*
              - elasticache:ListTagsForResource
              # ElasticSearch Reservations
              - es:DescribeReserved*
              - es:ListTags
              # memoryDB
              - memorydb:DescribeReserved*
              - memorydb:ListTags
              # Saving Plans read only access
              # - savingsplans:Describe*
              # - savingsplans:List*
              # NOTE: this is handled by the `arn:aws:iam::aws:policy/AWSSavingsPlansReadOnlyAccess` policy attachment above - dpanofsky
          # Explicitly denying data plane API Calls
          - Sid: ExplicitDenyToDataPlane
            Effect: Deny
            Resource: "*"
            Action:
              - athena:StartCalculationExecution
              - athena:StartQueryExecution
              - dynamodb:GetItem
              - dynamodb:BatchGetItem
              - dynamodb:Query
              - dynamodb:Scan
              - ec2:GetConsoleOutput
              - ec2:GetConsoleScreenshot
              - ecr:BatchGetImage
              - ecr:GetAuthorizationToken
              - ecr:GetDownloadUrlForLayer
              - ecs:RegisterTaskDefinition
              - kinesis:GetRecords
              - kinesis:GetShardIterator
              - lambda:GetFunction
              - logs:GetLogEvents
              - sdb:Select*
              - sqs:ReceiveMessage
              - rds-data:*
          # NOTE: added this to explicitly deny read access to S3 objects following pattern from other deny lists - dpanofsky
          - Sid: ExplicitDenyOnS3Files
            Effect: Deny
            Action:
              - s3:GetObject
            Resource:
              - arn:aws:s3:::*/*

  # RI / commitment write APIs (separate policy; mirrors inventory_savings_modifications_policy in Terraform).
  InventorySavingsModificationsPolicy:
    Type: AWS::IAM::Policy
    Condition: SavingsModificationsEnabled
    DependsOn: IAMCrossAccountExecutionRole
    Properties:
      PolicyName: !Sub "${Prefix}-asset-crawler-savings-modifications${RoleSuffix}"
      Roles:
        - !Ref "IAMCrossAccountExecutionRole"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Sid: CommitmentManagementPermissions
            Resource: "*"
            Action:
              # DynamoDB Reservations
              - dynamodb:PurchaseReservedCapacityOfferings
              # EC2 Reservations
              - ec2:ModifyReservedInstances
              - ec2:PurchaseReservedInstancesOffering
              - ec2:CreateReservedInstancesListing
              - ec2:CancelReservedInstancesListing
              - ec2:GetReservedInstancesExchangeQuote
              - ec2:AcceptReservedInstancesExchangeQuote
              # RDS Reservations
              - rds:PurchaseReservedDBInstancesOffering
              # Redshift Reservations
              - redshift:AcceptReservedNodeExchange
              - redshift:PurchaseReservedNodeOffering
              # ElastiCache Reservations
              - elasticache:PurchaseReservedCacheNodesOffering
              # ElasticSearch Reservations
              - es:PurchaseReservedElasticsearchInstanceOffering
              - es:PurchaseReservedInstanceOffering
              # memoryDB
              - memorydb:PurchaseReservedNodesOffering
              # Saving Plans full management
              # - savingsplans:*
              # NOTE: this is handled by the `arn:aws:iam::aws:policy/AWSSavingsPlansFullAccess` policy attached above - dpanofsky

  ################################################################
  #
  # Scheduling & Scaling (FinOps cost optimization)
  # Only created when EnableScheduling is "true"
  #
  ################################################################
  SchedulingPolicy:
    Type: AWS::IAM::Policy
    Condition: SchedulingEnabled
    DependsOn: IAMCrossAccountExecutionRole
    Properties:
      PolicyName: !Sub "${Prefix}-asset-crawler-scheduling${RoleSuffix}"
      Roles:
        - !Ref "IAMCrossAccountExecutionRole"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: SchedulingPermissions
            Effect: Allow
            Resource: "*"
            Action:
              # ECS Scaling
              - ecs:UpdateService
              # EC2 Stop/Start
              - ec2:StartInstances
              - ec2:StopInstances
              # RDS Stop/Start
              - rds:StartDBInstance
              - rds:StopDBInstance
              - rds:StartDBCluster
              - rds:StopDBCluster
              # Lambda Concurrency
              - lambda:PutProvisionedConcurrencyConfig
              - lambda:DeleteProvisionedConcurrencyConfig
              - lambda:PutFunctionConcurrency
              - lambda:DeleteFunctionConcurrency
              # EKS Nodegroup Scaling
              - eks:UpdateNodegroupConfig
              # ASG Scaling
              - autoscaling:UpdateAutoScalingGroup
              - autoscaling:SetDesiredCapacity
              # Application Auto Scaling (NOTE: covers all App Auto Scaling
              # namespaces (ECS, DynamoDB, AppStream, etc.); AWS does not
              # offer namespace-scoped IAM actions for this service)
              - application-autoscaling:RegisterScalableTarget
              # ElastiCache Scaling (NOTE: these actions are broader than scaling
              # alone; they also allow changing engine versions, parameter groups,
              # etc., but AWS does not offer finer-grained actions)
              - elasticache:ModifyReplicationGroup
              - elasticache:ModifyCacheCluster
              # Redshift Scaling (NOTE: ResizeCluster also allows changing node
              # types, not just counts, which could affect costs)
              - redshift:PauseCluster
              - redshift:ResumeCluster
              - redshift:ResizeCluster
              # SageMaker Scaling
              - sagemaker:UpdateEndpointWeightsAndCapacities

  ################################################################
  #
  # Notifications for Feedback Loop
  #
  ################################################################
  IAMCrossAccountNotificationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Prefix}-feedback-loop-control-plane${RoleSuffix}"
      MaxSessionDuration: 43200
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: cross-account-event-forwarder
          PolicyDocument:
            Version: 2012-10-17
            Statement:
              - Effect: Allow
                Action: "events:PutEvents"
                Resource: !Sub "arn:aws:events:*:${CustomerAccountID}:event-bus/control-plane"

  CloudFormationNotifier:
    Type: AWS::Events::Rule
    DependsOn: IAMCrossAccountNotificationRole
    Properties:
      Description: Notifies when one of our CloudFormation Stack changes state
      EventPattern:
        resources:
          - wildcard: !Sub "*${Prefix}*"
        source:
          - aws.cloudformation
        detail-type:
          - "CloudFormation Stack Status Change"
          - "CloudFormation StackSet StackInstance Status Change"
        detail:
          status-details:
            status:
              [
                "CREATE_COMPLETE",
                "CREATE_FAILED",
                "DELETE_COMPLETE",
                "DELETE_FAILED",
                "ROLLBACK_COMPLETE",
                "ROLLBACK_FAILED",
                "UPDATE_COMPLETE",
                "UPDATE_FAILED",
                "UPDATE_ROLLBACK_COMPLETE",
                "UPDATE_ROLLBACK_FAILED",
              ]
      State: "ENABLED"
      Targets:
        - Id: CloudFormationNotifier
          Arn: !Sub "arn:aws:events:${AWS::Region}:${CustomerAccountID}:event-bus/control-plane"
          RoleArn: !GetAtt IAMCrossAccountNotificationRole.Arn

Outputs:
  RoleArn:
    Description: ARN of the IAM Role
    Value: !GetAtt "IAMCrossAccountExecutionRole.Arn"
  RoleId:
    Description: Id of the IAM Role
    Value: !GetAtt "IAMCrossAccountExecutionRole.RoleId"
